<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'chat-bg': '#212121',
            'sidebar-bg': '#171717',
            'input-bg': '#2f2f2f',
            'message-user': '#2f2f2f',
            'message-bot': '#212121',
            'border-subtle': '#3f3f3f',
            'text-primary': '#ececec',
            'text-muted': '#8e8ea0',
            'accent': '#10a37f',
            'accent-hover': '#0d8c6d',
          },
          animation: {
            'pulse-dot': 'pulseDot 1.4s ease-in-out infinite',
            'fade-in': 'fadeIn 0.3s ease-in-out',
            'slide-up': 'slideUp 0.3s ease-out',
          },
          keyframes: {
            pulseDot: {
              '0%, 80%, 100%': { opacity: 0.2, transform: 'scale(0.8)' },
              '40%': { opacity: 1, transform: 'scale(1)' },
            },
            fadeIn: {
              from: { opacity: 0 },
              to: { opacity: 1 },
            },
            slideUp: {
              from: { opacity: 0, transform: 'translateY(8px)' },
              to: { opacity: 1, transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>

  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- highlight.js for code syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    /* ── Scrollbar styling ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f3f; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* ── Prose / Markdown overrides inside chat bubbles ── */
    .prose { color: #ececec; max-width: none; }
    .prose h1, .prose h2, .prose h3, .prose h4 { color: #ececec; margin-top: 1rem; margin-bottom: 0.5rem; font-weight: 600; }
    .prose h1 { font-size: 1.4em; }
    .prose h2 { font-size: 1.2em; }
    .prose h3 { font-size: 1.05em; }
    .prose p { margin: 0.5rem 0; line-height: 1.7; }
    .prose ul, .prose ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .prose li { margin: 0.25rem 0; }
    .prose strong { color: #fff; font-weight: 600; }
    .prose em { color: #ccc; }
    .prose a { color: #10a37f; text-decoration: underline; }
    .prose blockquote { border-left: 3px solid #10a37f; padding-left: 1rem; color: #aaa; margin: 0.75rem 0; }
    .prose hr { border-color: #3f3f3f; margin: 1rem 0; }
    .prose table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; }
    .prose th { background: #2f2f2f; padding: 0.5rem 0.75rem; text-align: left; border: 1px solid #3f3f3f; font-weight: 600; }
    .prose td { padding: 0.5rem 0.75rem; border: 1px solid #3f3f3f; }
    .prose tr:nth-child(even) { background: #2a2a2a; }

    /* ── Inline code ── */
    .prose code:not(pre code) {
      background: #2f2f2f;
      color: #e2b96e;
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.875em;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    }

    /* ── Code blocks ── */
    .prose pre {
      background: #1a1a1a !important;
      border: 1px solid #3f3f3f;
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      position: relative;
      margin: 0.75rem 0;
    }
    .prose pre code {
      background: transparent !important;
      color: inherit;
      padding: 0;
      font-size: 0.85em;
    }

    /* ── Copy button on code blocks ── */
    .code-copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: #3f3f3f;
      color: #aaa;
      border: none;
      border-radius: 5px;
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
    }
    .prose pre:hover .code-copy-btn { opacity: 1; }
    .code-copy-btn:hover { background: #555; color: #fff; }

    /* ── Typing dots animation ── */
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #8e8ea0; margin: 0 2px; }
    .dot:nth-child(1) { animation: pulseDot 1.4s ease-in-out 0s infinite; }
    .dot:nth-child(2) { animation: pulseDot 1.4s ease-in-out 0.2s infinite; }
    .dot:nth-child(3) { animation: pulseDot 1.4s ease-in-out 0.4s infinite; }
    @keyframes pulseDot {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Textarea auto-resize ── */
    #userInput {
      resize: none;
      overflow-y: hidden;
      min-height: 52px;
      max-height: 200px;
    }

    /* ── Message animation ── */
    .message-row { animation: slideUp 0.25s ease-out; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Send button disabled state ── */
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Sources badge ── */
    .source-badge {
      display: inline-block;
      background: #2f2f2f;
      border: 1px solid #3f3f3f;
      color: #8e8ea0;
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      font-size: 0.72rem;
      margin: 0.2rem;
    }
  </style>
</head>

<body class="bg-chat-bg text-text-primary font-sans h-screen flex flex-col overflow-hidden">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="flex items-center justify-between px-4 py-3 border-b border-border-subtle bg-chat-bg flex-shrink-0">
    <div class="flex items-center gap-3">
      <!-- Logo / icon -->
      <div class="w-8 h-8 rounded-full bg-accent flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"/>
        </svg>
      </div>
      <div>
        <h1 class="font-semibold text-sm leading-tight">RAG Chat</h1>
        <p class="text-text-muted text-xs">Powered by Supabase + OpenAI</p>
      </div>
    </div>

    <!-- Clear conversation button -->
    <button id="clearBtn"
      title="Clear conversation"
      class="flex items-center gap-1.5 text-text-muted hover:text-text-primary text-xs px-3 py-1.5 rounded-lg hover:bg-input-bg transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
      Clear
    </button>
  </header>

  <!-- ── Messages area ────────────────────────────────────────────────────── -->
  <main id="messagesContainer" class="flex-1 overflow-y-auto px-4 py-6 space-y-6">

    <!-- Welcome message (shown when no conversation) -->
    <div id="welcomeScreen" class="flex flex-col items-center justify-center h-full text-center px-4 gap-4 pb-16">
      <div class="w-16 h-16 rounded-full bg-accent/20 flex items-center justify-center">
        <svg class="w-8 h-8 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
      </div>
      <div>
        <h2 class="text-2xl font-semibold text-text-primary mb-2">How can I help you?</h2>
        <p class="text-text-muted text-sm max-w-sm">
          Ask anything about the data in your knowledge base. I'll search for relevant information and generate a precise answer.
        </p>
      </div>

      <!-- Suggestion chips -->
      <div class="flex flex-wrap gap-2 justify-center mt-2" id="suggestions">
        <button class="suggestion-chip px-4 py-2 rounded-xl bg-input-bg border border-border-subtle text-sm text-text-primary hover:border-accent/50 transition-colors">
          What topics are covered in the knowledge base?
        </button>
        <button class="suggestion-chip px-4 py-2 rounded-xl bg-input-bg border border-border-subtle text-sm text-text-primary hover:border-accent/50 transition-colors">
          Give me a summary of the main documents.
        </button>
        <button class="suggestion-chip px-4 py-2 rounded-xl bg-input-bg border border-border-subtle text-sm text-text-primary hover:border-accent/50 transition-colors">
          What information can you find about this topic?
        </button>
      </div>
    </div>

  </main>

  <!-- ── Input area ───────────────────────────────────────────────────────── -->
  <div class="flex-shrink-0 px-4 pb-5 pt-3 bg-chat-bg">
    <div class="max-w-3xl mx-auto">
      <div class="flex items-end gap-3 bg-input-bg border border-border-subtle rounded-2xl px-4 py-3 focus-within:border-accent/50 transition-colors">
        <textarea
          id="userInput"
          placeholder="Message RAG Chat..."
          rows="1"
          class="flex-1 bg-transparent text-text-primary placeholder-text-muted text-sm outline-none leading-relaxed"
        ></textarea>
        <button id="sendBtn"
          class="flex-shrink-0 w-8 h-8 rounded-full bg-accent hover:bg-accent-hover transition-colors flex items-center justify-center disabled:opacity-40 disabled:cursor-not-allowed"
          disabled>
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <p class="text-center text-text-muted text-xs mt-2">
        Answers are grounded in your knowledge base. Always verify critical information.
      </p>
    </div>
  </div>

  <!-- ── Message template (cloned by JS) ─────────────────────────────────── -->
  <template id="userMessageTemplate">
    <div class="message-row flex justify-end">
      <div class="max-w-[75%] md:max-w-[65%]">
        <div class="bg-message-user rounded-2xl rounded-br-sm px-4 py-3 text-sm leading-relaxed border border-border-subtle">
          <p class="message-text whitespace-pre-wrap"></p>
        </div>
      </div>
    </div>
  </template>

  <template id="botMessageTemplate">
    <div class="message-row flex justify-start gap-3">
      <div class="w-8 h-8 rounded-full bg-accent flex items-center justify-center flex-shrink-0 mt-0.5">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"/>
        </svg>
      </div>
      <div class="flex-1 max-w-[85%] md:max-w-[75%]">
        <!-- Status line (hidden by default) -->
        <div class="status-line text-text-muted text-xs mb-2 flex items-center gap-1.5 hidden">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="status-text"></span>
        </div>
        <!-- Content -->
        <div class="prose text-sm leading-relaxed message-content"></div>
        <!-- Sources (hidden until received) -->
        <div class="sources-section hidden mt-3">
          <p class="text-text-muted text-xs mb-1 font-medium">Sources used:</p>
          <div class="sources-list flex flex-wrap"></div>
        </div>
        <!-- Action buttons -->
        <div class="message-actions flex items-center gap-1 mt-2 opacity-0 transition-opacity group-hover:opacity-100">
          <button class="copy-btn text-text-muted hover:text-text-primary p-1 rounded-md hover:bg-input-bg transition-colors" title="Copy response">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- ── JavaScript ───────────────────────────────────────────────────────── -->
  <script>
    // ── marked.js configuration ───────────────────────────────────────────
    marked.setOptions({
      breaks: true,
      gfm: true,
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
    });

    // Custom renderer: wrap code blocks with a copy button
    const renderer = new marked.Renderer();
    renderer.code = (code, language) => {
      const lang = language || 'plaintext';
      let highlighted;
      try {
        highlighted = hljs.getLanguage(lang)
          ? hljs.highlight(code, { language: lang }).value
          : hljs.highlightAuto(code).value;
      } catch { highlighted = code; }
      return `<pre><code class="hljs language-${lang}">${highlighted}</code><button class="code-copy-btn" onclick="copyCode(this)">Copy</button></pre>`;
    };
    marked.use({ renderer });

    // ── State ─────────────────────────────────────────────────────────────
    let conversationHistory = []; // { role: 'user'|'assistant', content: string }
    let isStreaming = false;

    // ── DOM refs ──────────────────────────────────────────────────────────
    const messagesContainer = document.getElementById('messagesContainer');
    const welcomeScreen     = document.getElementById('welcomeScreen');
    const userInput         = document.getElementById('userInput');
    const sendBtn           = document.getElementById('sendBtn');
    const clearBtn          = document.getElementById('clearBtn');

    // ── Auto-resize textarea ──────────────────────────────────────────────
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
      sendBtn.disabled = userInput.value.trim() === '' || isStreaming;
    });

    // ── Send on Enter (Shift+Enter = newline) ─────────────────────────────
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ── Clear conversation ─────────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
      conversationHistory = [];
      // Remove all message rows, restore welcome screen
      const rows = messagesContainer.querySelectorAll('.message-row');
      rows.forEach(r => r.remove());
      welcomeScreen.classList.remove('hidden');
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;
    });

    // ── Suggestion chips ──────────────────────────────────────────────────
    document.querySelectorAll('.suggestion-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        userInput.value = btn.textContent.trim();
        userInput.dispatchEvent(new Event('input'));
        sendMessage();
      });
    });

    // ── Copy full message text ─────────────────────────────────────────────
    function copyMessageText(btn) {
      const content = btn.closest('.flex-1').querySelector('.message-content');
      const text = content ? content.innerText : '';
      navigator.clipboard.writeText(text).then(() => {
        const icon = btn.querySelector('svg');
        btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>`;
        setTimeout(() => { btn.innerHTML = icon.outerHTML; }, 2000);
      });
    }

    // ── Copy code block ───────────────────────────────────────────────────
    window.copyCode = (btn) => {
      const code = btn.previousElementSibling.innerText;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
      });
    };

    // ── Scroll to bottom ──────────────────────────────────────────────────
    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // ── Append a user message bubble ──────────────────────────────────────
    function appendUserMessage(text) {
      welcomeScreen.classList.add('hidden');
      const tpl = document.getElementById('userMessageTemplate');
      const clone = tpl.content.cloneNode(true);
      clone.querySelector('.message-text').textContent = text;
      messagesContainer.appendChild(clone);
      scrollToBottom();
    }

    // ── Append a bot message bubble (returns refs for streaming) ──────────
    function appendBotMessage() {
      const tpl = document.getElementById('botMessageTemplate');
      const clone = tpl.content.cloneNode(true);
      const wrapper = clone.querySelector('.message-row');

      // Make actions visible on hover
      wrapper.classList.add('group');
      const copyBtn = clone.querySelector('.copy-btn');
      copyBtn.addEventListener('click', () => copyMessageText(copyBtn));

      messagesContainer.appendChild(clone);
      scrollToBottom();

      // Return refs to the live DOM nodes (after appendChild)
      const lastRow = messagesContainer.lastElementChild;
      return {
        statusLine:  lastRow.querySelector('.status-line'),
        statusText:  lastRow.querySelector('.status-text'),
        content:     lastRow.querySelector('.message-content'),
        sourcesSection: lastRow.querySelector('.sources-section'),
        sourcesList: lastRow.querySelector('.sources-list'),
      };
    }

    // ── Main send function ────────────────────────────────────────────────
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || isStreaming) return;

      // Reset input
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;
      isStreaming = true;

      // Add user bubble
      appendUserMessage(text);

      // Push to history
      conversationHistory.push({ role: 'user', content: text });

      // Add bot bubble
      const bot = appendBotMessage();

      // Show status / thinking indicator
      bot.statusLine.classList.remove('hidden');
      bot.statusText.textContent = 'Thinking...';

      let accumulatedText = ''; // collects all tokens for conversation history

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${response.status}`);
        }

        const reader   = response.body.getReader();
        const decoder  = new TextDecoder();
        let buffer     = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          // SSE messages are separated by double newlines
          const parts = buffer.split('\n\n');
          buffer = parts.pop(); // keep incomplete chunk

          for (const part of parts) {
            const line = part.trim();
            if (!line.startsWith('data:')) continue;
            const jsonStr = line.slice(5).trim();
            if (!jsonStr) continue;

            let event;
            try { event = JSON.parse(jsonStr); } catch { continue; }

            switch (event.type) {
              case 'status':
                bot.statusLine.classList.remove('hidden');
                bot.statusText.textContent = event.message;
                break;

              case 'token':
                // Hide status line on first token
                bot.statusLine.classList.add('hidden');
                accumulatedText += event.content;
                // Re-render Markdown on each token for live preview
                bot.content.innerHTML = marked.parse(accumulatedText);
                // Apply syntax highlighting to newly rendered code blocks
                bot.content.querySelectorAll('pre code:not(.hljs)').forEach(block => {
                  hljs.highlightElement(block);
                });
                scrollToBottom();
                break;

              case 'sources':
                if (event.sources && event.sources.length > 0) {
                  bot.sourcesSection.classList.remove('hidden');
                  event.sources.forEach(src => {
                    if (!src) return;
                    const badge = document.createElement('span');
                    badge.className = 'source-badge';
                    badge.textContent = src.length > 60 ? src.slice(0, 57) + '…' : src;
                    bot.sourcesList.appendChild(badge);
                  });
                }
                break;

              case 'error':
                bot.statusLine.classList.add('hidden');
                bot.content.innerHTML = `<p class="text-red-400">⚠ ${event.message}</p>`;
                break;

              case 'done':
                // Add assistant response to history
                conversationHistory.push({ role: 'assistant', content: accumulatedText });
                break;
            }
          }
        }
      } catch (err) {
        bot.statusLine.classList.add('hidden');
        bot.content.innerHTML = `<p class="text-red-400">⚠ Failed to connect to server: ${err.message}</p>`;
      } finally {
        isStreaming = false;
        sendBtn.disabled = userInput.value.trim() === '';
        scrollToBottom();
      }
    }
  </script>
</body>
</html>
